<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mon Stock - Olivier</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        :root { --bg-color: #000000; --card-bg: #1c1c1e; --accent-blue: #0a84ff; --accent-red: #ff453a; --text-color: #ffffff; --border-color: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .header { display: flex; align-items: center; justify-content: center; padding: 25px 20px 10px; position: relative; }
        .logo-container { width: 80%; max-width: 280px; border: 2px solid #3a2a20; border-radius: 50px; padding: 8px; background: linear-gradient(to bottom, #4a3a30, #2a1a10); text-align: center; }
        .menu-btn { position: absolute; left: 20px; font-size: 24px; color: var(--accent-blue); cursor: pointer; }
        .dropdown-menu { display: none; position: absolute; left: 20px; top: 75px; background: var(--card-bg); border-radius: 10px; z-index: 100; border: 1px solid #38383a; }
        .dropdown-menu div { padding: 12px 20px; border-bottom: 0.5px solid #38383a; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        
        .container { padding: 0 15px 30px 15px; }
        
        /* CHAMP DESIGNATION ANTI-CONTACT IPHONE */
        .input-anti-contact { 
            width: 100%; box-sizing: border-box; padding: 12px; background: #2c2c2e; border: none; 
            border-radius: 10px; color: white; margin: 5px 0 10px 0; font-size: 16px;
            resize: none; height: 45px; display: block; font-family: inherit;
        }

        .btn { background: var(--card-bg); color: var(--accent-blue); border: none; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 500; text-align: center; cursor: pointer; }
        .btn-save { background: var(--accent-blue); color: white; width: 100%; margin-top: 15px; }
        
        /* ALIGNEMENTS */
        .item-card { background: var(--card-bg); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; position: relative; }
        .item-info { flex: 1; padding-right: 45px; }
        .item-actions { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .item-actions i { font-size: 18px; color: var(--accent-blue); }
        
        .stepper { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; }
        .step-btns { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .step-btns i { color: var(--accent-blue); font-size: 28px; }
        .step-btns span { font-size: 20px; font-weight: 600; min-width: 40px; text-align: center; }

        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 50; overflow-y: auto; }
        .page.active { display: block; }
        .page-header { display: flex; align-items: center; padding: 40px 20px 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header">
            <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
            <div class="dropdown-menu" id="main-menu">
                <div onclick="handleExportClick()"><i class="fas fa-share-alt"></i> Exporter/Partager</div>
                <div onclick="handleImportClick()"><i class="fas fa-file-import"></i> Importer Stock</div>
            </div>
            <div class="logo-container">
                <h1 style="margin:2px 0; font-size: 20px; color:#50b0f0;">MON <span style="color:#f05050;">STOCK</span></h1>
                <small style="color: #e0c090; font-size: 11px;">OLIVIER</small>
            </div>
        </div>
        <div class="container">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn" onclick="openAddPage()">Ajouter</button>
                <button class="btn" onclick="openStockPage()">Voir Stock</button>
            </div>
        </div>
    </div>

    <div id="page-edit" class="page">
        <div class="page-header">
            <i class="fas fa-chevron-left" style="color:var(--accent-blue); font-size:22px; margin-right:15px;" onclick="goToHome()"></i>
            <h2 id="edit-title">Ajouter</h2>
        </div>
        <div class="container">
            <label style="color:#8e8e93; font-size:11px;">Désignation</label>
            <textarea id="inp-name" class="input-anti-contact" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Nom du produit"></textarea>

            <div class="stepper"><span>Tour</span>
                <div class="step-btns">
                    <i class="fas fa-minus-circle" onclick="changeVal('inp-tour', -1)"></i>
                    <span id="inp-tour">0</span>
                    <i class="fas fa-plus-circle" onclick="changeVal('inp-tour', 1)"></i>
                </div>
            </div>
            <div class="stepper"><span>Bac</span>
                <div class="step-btns">
                    <i class="fas fa-minus-circle" onclick="changeVal('inp-bac', -1)"></i>
                    <span id="inp-bac">0</span>
                    <i class="fas fa-plus-circle" onclick="changeVal('inp-bac', 1)"></i>
                </div>
            </div>
            <div class="stepper"><span>Quantité</span>
                <div class="step-btns">
                    <i class="fas fa-minus-circle" onclick="changeVal('inp-qty', -1)"></i>
                    <span id="inp-qty">1</span>
                    <i class="fas fa-plus-circle" onclick="changeVal('inp-qty', 1)"></i>
                </div>
            </div>
            <button class="btn btn-save" onclick="saveProduct()">Enregistrer</button>
        </div>
    </div>

    <div id="page-stock" class="page">
        <div class="page-header">
            <i class="fas fa-chevron-left" style="color:var(--accent-blue); font-size:22px; margin-right:15px;" onclick="goToHome()"></i>
            <h2 style="color: white;">Stock</h2>
        </div>
        <div class="container">
            <div class="stepper" style="border: 1px solid var(--border-color); margin-bottom:15px;">
                <span style="color:white;">Filtrer Tour (0=Tous)</span>
                <div class="step-btns">
                    <i class="fas fa-minus-circle" onclick="changeFilterTour(-1)"></i>
                    <span id="display-filter-tour">0</span>
                    <i class="fas fa-plus-circle" onclick="changeFilterTour(1)"></i>
                </div>
            </div>
            <div id="stock-list-container"></div>
        </div>
    </div>

    <script>
        let db = []; let editingId = null; let filterTour = 0;
        async function initDB() { db = await localforage.getItem('monStockDB') || []; }
        initDB();
        async function saveDB() { await localforage.setItem('monStockDB', db); }

        function changeVal(id, d) { let e = document.getElementById(id); e.innerText = Math.max(0, parseInt(e.innerText) + d); }
        function goToHome() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-home').classList.add('active'); }
        
        async function saveProduct() {
            const name = document.getElementById('inp-name').value.trim();
            if (!name) return alert("Nom requis");
            const item = {
                id: editingId || Date.now(),
                name: name,
                tour: document.getElementById('inp-tour').innerText,
                bac: document.getElementById('inp-bac').innerText,
                qty: document.getElementById('inp-qty').innerText
            };
            if (editingId) db = db.map(p => p.id === editingId ? item : p);
            else db.push(item);
            await saveDB(); goToHome();
        }

        function createItemHTML(p) {
            return `<div class="item-card">
                <div class="item-info"><h4>${p.name}</h4><p>T:${p.tour} | B:${p.bac} | Q:${p.qty}</p></div>
                <div class="item-actions">
                    <i class="fas fa-pencil-alt" onclick="editProduct(${p.id})"></i>
                    <i class="fas fa-trash-alt" style="color:var(--accent-red)" onclick="deleteProduct(${p.id})"></i>
                </div>
            </div>`;
        }

        function editProduct(id) {
            const p = db.find(x => x.id === id);
            editingId = id;
            document.getElementById('edit-title').innerText = "Modifier";
            document.getElementById('inp-name').value = p.name;
            document.getElementById('inp-tour').innerText = p.tour;
            document.getElementById('inp-bac').innerText = p.bac;
            document.getElementById('inp-qty').innerText = p.qty;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-edit').classList.add('active');
        }

        function openAddPage() {
            editingId = null; document.getElementById('edit-title').innerText = "Ajouter";
            document.getElementById('inp-name').value = ""; document.getElementById('inp-tour').innerText = "0";
            document.getElementById('inp-bac').innerText = "0"; document.getElementById('inp-qty').innerText = "1";
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-edit').classList.add('active');
        }

        function openStockPage() { renderStockList(); document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-stock').classList.add('active'); }
        function changeFilterTour(d) { filterTour = Math.max(0, filterTour + d); document.getElementById('display-filter-tour').innerText = filterTour; renderStockList(); }
        function renderStockList() {
            const container = document.getElementById('stock-list-container');
            container.innerHTML = "";
            db.filter(p => filterTour === 0 || String(p.tour) === String(filterTour)).forEach(p => container.innerHTML += createItemHTML(p));
        }

        async function deleteProduct(id) { if(confirm("Supprimer ?")) { db = db.filter(p => p.id !== id); await saveDB(); renderStockList(); }}
        function toggleMenu() { const m = document.getElementById('main-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }

        async function handleExportClick() {
            const data = JSON.stringify(db);
            const file = new File([data], 'stock_olivier.json', { type: 'application/json' });
            if (navigator.share) {
                try { await navigator.share({ files: [file], title: 'Stock Olivier' }); } catch (err) {}
            } else {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data])); a.download = 'stock_olivier.json'; a.click();
            }
        }
        function handleImportClick() { let i = document.createElement('input'); i.type='file'; i.accept='.json'; i.onchange= e => {
            const r = new FileReader(); r.onload = async event => { db = JSON.parse(event.target.result); await saveDB(); location.reload(); }; r.readAsText(e.target.files[0]);
        }; i.click(); }
    </script>
</body>
</html>
